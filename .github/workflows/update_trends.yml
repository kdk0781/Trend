name: Update Trends Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Fetch Trends Data
        run: node fetch_trends.js
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }} # 깃허브 시크릿에서 키를 불러와 주입

      - name: Commit and Push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -f trends.json ]; then
            git add trends.json
            git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update trends data" && git push)
          else
            echo "trends.json 파일이 없어 커밋을 건너뜁니다."
          fi
