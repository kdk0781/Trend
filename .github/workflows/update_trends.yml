name: Update Google Trends Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 경고 해결을 위해 24 버전으로 변경

      - name: Install Dependencies
        run: npm install

      - name: Fetch Trends Data
        run: node fetch_trends.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # trends.json 파일이 존재하는지 확인하는 방어 로직
          if [ -f trends.json ]; then
            git add trends.json
            git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update trends data" && git push)
          else
            echo "trends.json 파일이 생성되지 않아 커밋을 건너뜁니다."
          fi
