<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🔥 실시간 트렌드 대시보드</title>
  <!-- 눈누 웹폰트 (Pretendard) 적용 -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  
  <style>
    /* CSS 변수 (라이트/다크 모드 색상 정의) */
    :root {
      --bg-color: #f4f6f9;
      --card-bg: #ffffff;
      --text-main: #1a1a1a;
      --text-sub: #888888;
      --border-color: #eaeaea;
      --hover-bg: #f8f9fa;
      --rank-bg: #e9ecef;
      --rank-text: #495057;
      --traffic-bg: #f1f3f5;
      --btn-bg: #1a73e8;
      --btn-hover: #1557b0;
      --skeleton-bg: #e9ecef;
      --skeleton-shine: #f8f9fa;
    }
    
    [data-theme="dark"] {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --text-main: #e0e0e0;
      --text-sub: #a0a0a0;
      --border-color: #333333;
      --hover-bg: #2a2a2a;
      --rank-bg: #333333;
      --rank-text: #e0e0e0;
      --traffic-bg: #2d2d2d;
      --btn-bg: #4c8bf5;
      --btn-hover: #3b71ca;
      --skeleton-bg: #333333;
      --skeleton-shine: #444444;
    }

    /* 기본 초기화 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      transition: background-color 0.3s, color 0.3s;
      line-height: 1.6;
    }

    /* 상단 헤더 및 컨트롤 패널 */
    header {
      background-color: var(--card-bg);
      padding: 30px 20px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
      margin-bottom: 30px;
      position: relative;
    }
    header h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
    header p { font-size: 0.95rem; color: var(--text-sub); margin-bottom: 20px; }
    
    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      align-items: center;
    }
    button {
      background-color: var(--btn-bg);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    button:hover { background-color: var(--btn-hover); transform: translateY(-1px); }
    .theme-btn { background-color: var(--rank-bg); color: var(--text-main); padding: 10px; border-radius: 50%; width: 42px; height: 42px; justify-content: center; }
    .theme-btn:hover { background-color: var(--border-color); }

    /* 메인 레이아웃 */
    main {
      max-width: 1050px;
      margin: 0 auto;
      padding: 0 15px 50px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 25px;
    }
    @media (min-width: 768px) { main { grid-template-columns: 1fr 1fr; } }

    /* 카드 스타일 */
    .trend-card {
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.04);
      overflow: hidden;
      border: 1px solid var(--border-color);
    }
    .trend-header {
      padding: 20px 24px;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
    }
    .trend-header h2 { font-size: 1.2rem; font-weight: 700; }
    .icon { font-size: 1.3rem; margin-right: 10px; }

    /* 리스트 스타일 */
    .trend-list { list-style: none; }
    .trend-item {
      display: flex;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-color);
      transition: background-color 0.2s;
      text-decoration: none; /* 링크 밑줄 제거 */
      color: inherit;
    }
    .trend-item:last-child { border-bottom: none; }
    .trend-item:hover { background-color: var(--hover-bg); }
    
    .rank {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background-color: var(--rank-bg);
      color: var(--rank-text);
      border-radius: 8px;
      font-size: 0.9rem; font-weight: 700;
      margin-right: 16px; flex-shrink: 0;
    }
    /* 상위권 하이라이트 */
    .trend-item:nth-child(1) .rank { background-color: #ff4757; color: white; }
    .trend-item:nth-child(2) .rank { background-color: #ffa502; color: white; }
    .trend-item:nth-child(3) .rank { background-color: #2ed573; color: white; }

    .keyword { flex-grow: 1; font-size: 1.05rem; font-weight: 600; word-break: keep-all; }
    
    .traffic {
      font-size: 0.8rem; font-weight: 500;
      color: var(--text-sub);
      background: var(--traffic-bg);
      padding: 4px 10px; border-radius: 6px;
      margin-left: 10px; white-space: nowrap;
    }

    /* 스켈레톤 로딩 애니메이션 */
    .skeleton {
      background: linear-gradient(90deg, var(--skeleton-bg) 25%, var(--skeleton-shine) 50%, var(--skeleton-bg) 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 4px;
    }
    @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skel-rank { width: 28px; height: 28px; border-radius: 8px; margin-right: 16px; }
    .skel-text { width: 60%; height: 20px; }
    .skel-traffic { width: 50px; height: 20px; margin-left: auto; border-radius: 6px; }

    /* 토스트 알림 */
    #toast {
      visibility: hidden;
      min-width: 250px;
      background-color: #333;
      color: #fff;
      text-align: center;
      border-radius: 30px;
      padding: 12px 24px;
      position: fixed;
      z-index: 1000;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      font-size: 0.95rem;
      font-weight: 500;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    #toast.show {
      visibility: visible;
      animation: fadein 0.5s, fadeout 0.5s 2.5s;
    }
    @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
    @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
  </style>
</head>
<body>

  <header>
    <h1>🔥 오늘 실시간 트렌드</h1>
    <p id="update-time">마지막 업데이트: 데이터 확인 중...</p>
    <div class="controls">
      <button onclick="loadTrends(true)">🔄 최신 데이터 불러오기</button>
      <button class="theme-btn" onclick="toggleTheme()" title="다크모드 전환">🌙</button>
    </div>
  </header>

  <main>
    <!-- 구글 트렌드 영역 -->
    <section class="trend-card">
      <div class="trend-header">
        <span class="icon">🌐</span>
        <h2>구글 급상승 검색어</h2>
      </div>
      <ul id="google-list" class="trend-list">
        <!-- JS에서 스켈레톤 UI가 주입됨 -->
      </ul>
    </section>

    <!-- 국내 트렌드 영역 -->
    <section class="trend-card">
      <div class="trend-header">
        <span class="icon">🇰🇷</span>
        <h2>국내 이슈 검색어</h2>
      </div>
      <ul id="domestic-list" class="trend-list">
        <!-- JS에서 스켈레톤 UI가 주입됨 -->
      </ul>
    </section>
  </main>

  <div id="toast">✅ 최신 데이터를 불러왔습니다.</div>

  <script>
    // 1. 다크모드 관리 로직
    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = savedTheme || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      updateThemeButton(theme);
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeButton(newTheme);
    }

    function updateThemeButton(theme) {
      const btn = document.querySelector('.theme-btn');
      btn.innerText = theme === 'dark' ? '☀️' : '🌙';
    }

    // 2. 스켈레톤 UI 렌더링 함수
    function showSkeleton(elementId) {
      const listElement = document.getElementById(elementId);
      listElement.innerHTML = '';
      for (let i = 0; i < 10; i++) {
        listElement.innerHTML += `
          <li class="trend-item">
            <div class="skeleton skel-rank"></div>
            <div class="skeleton skel-text" style="width: ${Math.floor(Math.random() * 40 + 30)}%"></div>
            <div class="skeleton skel-traffic"></div>
          </li>
        `;
      }
    }

    // 3. 토스트 알림 함수
    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.innerText = message;
      toast.className = "show";
      setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
    }

    // 4. 메인 데이터 로드 함수
    async function loadTrends(isManualRefresh = false) {
      showSkeleton('google-list');
      showSkeleton('domestic-list');
      
      const jsonUrl = `trends.json?t=${new Date().getTime()}`;

      try {
        const response = await fetch(jsonUrl);
        if (!response.ok) throw new Error('데이터 파일을 찾을 수 없습니다.');
        const data = await response.json();

        // 업데이트 시간 표시
        const updateDate = new Date(data.updatedAt);
        const formattedDate = updateDate.toLocaleString('ko-KR', {
          year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
        });
        document.getElementById('update-time').innerText = `마지막 업데이트: ${formattedDate}`;

        // 리스트 렌더링
        renderList('google-list', data.google, 'google');
        renderList('domestic-list', data.domestic, 'naver');

        if (isManualRefresh) showToast("✅ 최신 데이터를 불러왔습니다.");

      } catch (error) {
        console.error('Error:', error);
        document.getElementById('update-time').innerText = '⚠️ 데이터 수집 서버 점검 중입니다.';
        document.getElementById('google-list').innerHTML = '<li class="trend-item" style="justify-content:center; color:var(--text-sub);">데이터를 불러올 수 없습니다.</li>';
        document.getElementById('domestic-list').innerHTML = '<li class="trend-item" style="justify-content:center; color:var(--text-sub);">데이터를 불러올 수 없습니다.</li>';
        if (isManualRefresh) showToast("❌ 데이터 갱신에 실패했습니다.");
      }
    }

    // 리스트 DOM 생성 함수 (검색 링크 연동 포함)
    function renderList(elementId, items, searchEngine) {
      const listElement = document.getElementById(elementId);
      listElement.innerHTML = ''; 

      if (!items || items.length === 0) {
        listElement.innerHTML = '<li class="trend-item" style="justify-content:center; color:var(--text-sub);">현재 수집된 데이터가 없습니다.</li>';
        return;
      }

      items.forEach(item => {
        // 클릭 시 검색 결과로 이동하는 URL 설정
        const searchUrl = searchEngine === 'google' 
          ? `https://www.google.com/search?q=${encodeURIComponent(item.keyword)}`
          : `https://search.naver.com/search.naver?query=${encodeURIComponent(item.keyword)}`;

        // <a> 태그로 감싸서 클릭 가능하게 만듦
        const li = document.createElement('a');
        li.href = searchUrl;
        li.target = "_blank"; // 새 창에서 열기
        li.className = 'trend-item';
        
        const trafficHtml = (item.traffic && item.traffic !== 'N/A') ? `<span class="traffic">${item.traffic}</span>` : '';

        li.innerHTML = `
          <span class="rank">${item.rank}</span>
          <span class="keyword">${item.keyword}</span>
          ${trafficHtml}
        `;
        listElement.appendChild(li);
      });
    }

    // 초기화 실행
    initTheme();
    loadTrends();
    
    // 매 10분마다 자동으로 화면을 새로고침하는 로직 (선택사항)
    setInterval(() => loadTrends(false), 600000); 

  </script>
</body>
</html>
